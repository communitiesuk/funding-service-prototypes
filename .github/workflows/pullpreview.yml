name: PullPreview
on:
  schedule:
    - cron: "30 2 * * *"
  pull_request:
    types: [labeled, unlabeled, synchronize, closed, reopened]

jobs:
  deploy:
    if: github.event_name == 'schedule' || github.event.label.name == 'pullpreview' || contains(github.event.pull_request.labels.*.name, 'pullpreview')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev
    permissions:
      id-token: write
      contents: read
      statuses: write
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate env file
        env:
          PULLPREVIEW_PASSWORD: ${{ secrets.PULLPREVIEW_PASSWORD }}
        run: |
          echo "PASSWORD=$PULLPREVIEW_PASSWORD" >> .env
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT }}:role/GithubCopilotDeploy
          role-session-name: pullpreview
          aws-region: eu-west-2
      - uses: pullpreview/action@v5
        with:
          admins: 'samuelhwilliams,srh-sloan,sfount,marcusher'
          always_on: 'main'
          compose_files: docker-compose.pullpreview.yml
          instance_type: micro
          ttl: 1h
          pre_script: .pullpreview/setup-pullpreview.sh
